const slots = ['top','right','bottom','left'];
let history = [];
let histPos = -1;
let timerInterval = null;
let startTime = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 500);
  updateTimer();
}

function updateTimer() {
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  document.getElementById('timer').textContent = m + ':' + String(s).padStart(2,'0');
}

function makeDot(cx, cy, r, color) {
  const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx', cx); c.setAttribute('cy', cy);
  c.setAttribute('r', r); c.setAttribute('fill', color);
  return c;
}

function drawDots(difficulty) {
  const ns = 'http://www.w3.org/2000/svg';
  // Clear all corners
  ['tl','tr','br','bl'].forEach(id => {
    document.getElementById('dots-' + id).innerHTML = '';
  });

  const tl = document.getElementById('dots-tl');
  const tr = document.getElementById('dots-tr');
  const br = document.getElementById('dots-br');
  const bl = document.getElementById('dots-bl');

  if (difficulty === 'easy') {
    // 1 white dot per corner
    const r = 7;
    tl.appendChild(makeDot(22, 22, r, 'white'));
    tr.appendChild(makeDot(298, 22, r, 'white'));
    br.appendChild(makeDot(298, 298, r, 'white'));
    bl.appendChild(makeDot(22, 298, r, 'white'));

  } else if (difficulty === 'medium') {
    // 2 red dots per corner
    // TL: vertical — stacked top to bottom
    tl.appendChild(makeDot(22, 15, 6, '#cc1f2e'));
    tl.appendChild(makeDot(22, 29, 6, '#cc1f2e'));
    // TR: horizontal — side by side going left from right edge
    tr.appendChild(makeDot(305, 22, 6, '#cc1f2e'));
    tr.appendChild(makeDot(291, 22, 6, '#cc1f2e'));
    // BR: vertical — stacked bottom to top
    br.appendChild(makeDot(298, 305, 6, '#cc1f2e'));
    br.appendChild(makeDot(298, 291, 6, '#cc1f2e'));
    // BL: horizontal — side by side going right from left edge
    bl.appendChild(makeDot(15, 298, 6, '#cc1f2e'));
    bl.appendChild(makeDot(29, 298, 6, '#cc1f2e'));

  } else {
    // 3 yellow dots per corner
    // TL: vertical
    tl.appendChild(makeDot(22, 12, 5, '#f5c842'));
    tl.appendChild(makeDot(22, 24, 5, '#f5c842'));
    tl.appendChild(makeDot(22, 36, 5, '#f5c842'));
    // TR: horizontal going left
    tr.appendChild(makeDot(308, 22, 5, '#f5c842'));
    tr.appendChild(makeDot(296, 22, 5, '#f5c842'));
    tr.appendChild(makeDot(284, 22, 5, '#f5c842'));
    // BR: vertical going up
    br.appendChild(makeDot(298, 308, 5, '#f5c842'));
    br.appendChild(makeDot(298, 296, 5, '#f5c842'));
    br.appendChild(makeDot(298, 284, 5, '#f5c842'));
    // BL: horizontal going right
    bl.appendChild(makeDot(12, 298, 5, '#f5c842'));
    bl.appendChild(makeDot(24, 298, 5, '#f5c842'));
    bl.appendChild(makeDot(36, 298, 5, '#f5c842'));
  }
}

function renderCard(entry) {
  const { nums, difficulty } = entry;
  slots.forEach((s, i) => {
    const n = nums[i];
    document.getElementById('num-' + s).textContent = String(n);
    document.getElementById('line-' + s).setAttribute('opacity', n === 9 ? '1' : '0');
  });
  drawDots(difficulty);
}

function nextCard() {
  if (histPos < history.length - 1) history = history.slice(0, histPos + 1);
  let idx;
  do { idx = Math.floor(Math.random() * combos.length); }
  while (history.length > 0 && idx === history[history.length-1].idx);
  const row = combos[idx];
  const nums = shuffle([row[0],row[1],row[2],row[3]]);
  const difficulty = row[4];
  history.push({ idx, nums, difficulty });
  histPos = history.length - 1;
  renderCard(history[histPos]);
  document.getElementById('counter').textContent = 'Card ' + (histPos + 1);
  document.getElementById('prev-btn').disabled = histPos === 0;
  startTimer();
}

function prevCard() {
  if (histPos <= 0) return;
  histPos--;
  renderCard(history[histPos]);
  document.getElementById('counter').textContent = 'Card ' + (histPos + 1);
  document.getElementById('prev-btn').disabled = histPos === 0;
  startTimer();
}

nextCard();
